<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - IPL Predictor</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui; background: #0a0e1a; color: #f1f5f9; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .login-box { background: #111827; border: 1px solid #1e293b; border-radius: 16px; padding: 32px; width: 90%; max-width: 360px; }
  h2 { text-align: center; margin-bottom: 24px; color: #f59e0b; }
  input { width:100%; padding: 12px; background: #0f1729; border: 1px solid #1e293b; border-radius: 8px; color: #f1f5f9; font-size: 14px; margin-bottom: 16px; outline: none; }
  input:focus { border-color: #f59e0b; }
  button { width:100%; padding: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); border:none; border-radius: 8px; font-size: 16px; font-weight: 700; color: #000; cursor: pointer; }
  .error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 12px; }
</style>
</head><body>
<div class="login-box">
  <h2>🏏 Admin Panel</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Admin Password" autofocus>
    <button type="submit">Login</button>
  </form>
</div>
</body></html>
